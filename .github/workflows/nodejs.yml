      with:
        node-version: 24.x

    - name: Check full unicode over machine property names
      run: |
        npm install && npm run prep && npm run vitest-unicode-machine-property



  unicode-error-messages:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over error messages
      run: |
        npm install && npm run prep && npm run vitest-unicode-error-message



  unicode-group-names:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over group / named-list names
      run: |
        npm install && npm run prep && npm run vitest-unicode-group-name



  unicode-state-decl-names:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over state-declaration names
      run: |
        npm install && npm run prep && npm run vitest-unicode-state-decl-name



  unicode-hooks:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over hook subjects and actions
      run: |
        npm install && npm run prep && npm run vitest-unicode-hook



  unicode-machine-metadata:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
