name: Full publish pipeline

on:
  push:
  pull_request:
    # Doc-only PRs that the build genuinely doesn't consume skip CI. NOT
    # listed (intentionally): src/doc_md/** (typedoc/changelog inputs),
    # CHANGELOG*.md, README.md, package.json, anything under src/ts/**.
    paths-ignore:
      - 'notes/**'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'LICENSE'

# Cancel in-progress PR runs when new commits land on the same branch.
# Main pushes are never cancelled — releases must run to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Browser provisioning is locked to the single `e2e` job below. The Chromium
# download costs multiple minutes, so every other job inherits this skip flag
# (defensive: the playwright packages currently ship no auto-download
# postinstall, but a future version might) and stays browser-free. The `e2e`
# job overrides this back to "0" — it is the one run that pays for a browser.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:



  # Escape hatch: detect a `#fullbuild` token in the head commit message so a
  # contributor can force the full main-style matrix on a PR. Runs on push too
  # (it reports fullbuild=false there) because the main jobs `needs:` it, and a
  # skipped dependency would cascade-skip them.
  detect-fullbuild:

    if: github.event_name == 'pull_request' || github.event_name == 'push'

    name: Detect #fullbuild opt-in
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      fullbuild: ${{ steps.detect.outputs.fullbuild }}

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 1
    - id: detect
      shell: bash
      run: |
        MSG=$(git log -1 --pretty=%B)
        if echo "$MSG" | grep -q '#fullbuild'; then
          echo "fullbuild=true" >> $GITHUB_OUTPUT
          echo "Detected #fullbuild — full matrix will run on this PR"
        else
          echo "fullbuild=false" >> $GITHUB_OUTPUT
        fi



  # PR check: one lean Ubuntu run — lite build (make_ci) + the full vitest
  # suite (incl. the 100% spec gate). Cheaper than the old full `make`; the
  # platform-invariant artifact work (docs/site/bundles/minify) is verified on
  # merge by test-main-full. Skipped when #fullbuild opts into the full matrix.
  test-pr:

    needs: [detect-fullbuild]
    if: github.event_name == 'pull_request' && needs.detect-fullbuild.outputs.fullbuild != 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
    - name: npm install and ci_test (vet + make_ci + vitest)
      run: |
        npm install && npm run ci_test
      env:
        CI: true



  e2e:

    # The ONE CI run that provisions a browser. It overrides the workflow-level
    # skip flag back to "0" so `e2e:install` downloads Chromium (cached across
    # runs), then runs the Playwright suite against a local servehere. Gated to
    # pull requests: main is PR-only, so this validates every change pre-merge
    # without re-paying the browser cost on the post-merge release pushes.
    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    # Cache the browser between runs, keyed on the lockfile (which changes when
    # the playwright version does). Cache hit → `playwright install` is a fast
    # no-op; miss → it pays the one-time download once and stores it.
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: npm install and run the e2e suite (provisions Chromium on cache miss)
      run: |
        npm install && npm run e2e
      env:
        CI: true



  unicode-atoms:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Check full unicode over atoms
      run: |
        npm install && npm run prep && npm run vitest-unicode-atom



  unicode-strings:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over strings
      run: |
        npm install && npm run prep && npm run vitest-unicode-string



  unicode-atom-labels:

