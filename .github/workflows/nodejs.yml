    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over string labels
      run: |
        npm install && npm run prep && npm run vitest-unicode-string-label



  unicode-actions:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
