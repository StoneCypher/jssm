name: Full publish pipeline

on:
  push:
  pull_request:
    # Doc-only PRs that the build genuinely doesn't consume skip CI. NOT
    # listed (intentionally): src/doc_md/** (typedoc/changelog inputs),
    # CHANGELOG*.md, README.md, package.json, anything under src/ts/**.
    paths-ignore:
      - 'notes/**'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'LICENSE'

# Cancel in-progress PR runs when new commits land on the same branch.
# Main pushes are never cancelled — releases must run to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Browser provisioning is locked to the single `e2e` job below. The Chromium
# download costs multiple minutes, so every other job inherits this skip flag
# (defensive: the playwright packages currently ship no auto-download
# postinstall, but a future version might) and stays browser-free. The `e2e`
# job overrides this back to "0" — it is the one run that pays for a browser.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:



  pr-check:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
    - name: npm install and ci_build (vet + test)
      run: |
        npm install && npm run ci_build
      env:
        CI: true



  e2e:

    # The ONE CI run that provisions a browser. It overrides the workflow-level
    # skip flag back to "0" so `e2e:install` downloads Chromium (cached across
    # runs), then runs the Playwright suite against a local servehere. Gated to
    # pull requests: main is PR-only, so this validates every change pre-merge
    # without re-paying the browser cost on the post-merge release pushes.
    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    # Cache the browser between runs, keyed on the lockfile (which changes when
    # the playwright version does). Cache hit → `playwright install` is a fast
    # no-op; miss → it pays the one-time download once and stores it.
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: npm install and run the e2e suite (provisions Chromium on cache miss)
      run: |
        npm install && npm run e2e
      env:
        CI: true



  unicode-atoms:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Check full unicode over atoms
      run: |
        npm install && npm run prep && npm run vitest-unicode-atom



  unicode-strings:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over strings
      run: |
        npm install && npm run prep && npm run vitest-unicode-string



  unicode-atom-labels:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over atom labels
      run: |
        npm install && npm run prep && npm run vitest-unicode-atom-label



  unicode-string-labels:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over string labels
      run: |
        npm install && npm run prep && npm run vitest-unicode-string-label



  unicode-actions:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over action statements
      run: |
        npm install && npm run prep && npm run vitest-unicode-action



  build:

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - node-version: 24.x   # fastest, so run first, to error fast
            os: ubuntu-latest
          - node-version: 24.x   # slowest, so run next. sort by slowest from here to get earliest end through parallelism
            os: macos-latest
          - node-version: 24.x   # finish check big-3 on latest current
            os: windows-latest
          - node-version: 23.x   # check newest non-lts too
            os: ubuntu-latest
          - node-version: 23.x   # check newest non-lts too
            os: macos-latest
          - node-version: 23.x   # check newest non-lts too
            os: windows-latest
          - node-version: 20.x   # vitest 4 / rolldown require Node ^20.19 || >=22.12 — that engine gap is why 21.x is absent
            os: ubuntu-latest
          - node-version: 22.x
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
    - name: npm install, build, and test (trimmed; full bundles+minify covered by pr-check and full-build)
      run: |
        npm install && npm run ci_test
      env:
        CI: true
    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v1.0.1
      with:
        github-token: ${{ secrets.github_token }}
        path-to-lcov: ./coverage/spec/lcov.info



  full-build:

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
    - name: npm install and full build (site, docs, cookbook, changelog, cloc, readme)
      run: |
        npm install && npm run build
      env:
        CI: true



  deploy-docs:

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: [full-build]

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # to force-push the built site to the gh-pages branch

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Build the site
      run: |
        npm install && npm run build
      env:
        CI: true

    # Publish docs/ to gh-pages with plain git and the built-in GITHUB_TOKEN —
    # no third-party action. A throwaway single-commit repo is created inside
    # docs/ and force-pushed, so gh-pages always equals the current build.
    # .nojekyll keeps GitHub Pages from dropping TypeDoc's _-prefixed assets.
    - name: Publish docs/ to gh-pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd docs
        touch .nojekyll
        git init -q
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -q -m "docs: publish site for ${GITHUB_SHA}"
        git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages



  benchmark:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Run the benchmarks
      run: |
        npm install && npm run benny



  verify-version-bump:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Verify the version was bumped
      run: |
        npm install
        git config --global user.email "stonecypher@users.noreply.github.com"
        git config --global user.name "John Haugeland through Github Actions"
        node ./src/buildjs/verify_version_bump.cjs



  release:

    if: (github.event_name == 'push') && (github.event.pusher.name == github.event.repository.owner.name) && (github.ref == 'refs/heads/main')

    needs: [build, full-build, verify-version-bump, unicode-strings, unicode-atoms, unicode-actions, unicode-atom-labels, unicode-string-labels]

    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AWS_GRAVITON_OIDC_ROLE: ${{ secrets.AWS_GRAVITON_OIDC_ROLE }}

    # npm Trusted Publishing via OIDC.  Replaces the long-lived
    # NPM_TOKEN secret with short-lived tokens that GitHub Actions
    # exchanges with npm at publish time, scoped to this specific
    # workflow run.  Requires a Trusted Publisher entry on the npm
    # package settings page matching org=StoneCypher, repo=jssm,
    # workflow=nodejs.yml.
    permissions:
      contents: write   # for actions/checkout, git push --tags, and create-release
      id-token: write   # for OIDC token issuance to npm

    steps:
    - uses: actions/checkout@v5

    - name: Export tag to envvars
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo $TAG

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        registry-url: https://registry.npmjs.org/

    - name: Push tags
      run: git push origin --tags

    - name: Create or update the release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ env.TAG }}" >/dev/null 2>&1; then
          echo "Release ${{ env.TAG }} already exists; updating title and notes."
          gh release edit "${{ env.TAG }}" --title "${{ env.TAG }}" --notes-file CHANGELOG.md
        else
          gh release create "${{ env.TAG }}" --title "${{ env.TAG }}" --notes-file CHANGELOG.md
        fi

    - name: Publish to npm (skip if version already on registry)
      run: |
        if npm view "jssm@${TAG}" version >/dev/null 2>&1; then
          echo "jssm@${TAG} already published; skipping."
        else
          npm publish --provenance --access public
        fi

    # Fire-and-forget Graviton benchmark of the released version. Both steps are
    # gated on the AWS OIDC role secret existing and are continue-on-error, so the
    # release (already published above) never fails on a benchmark hiccup, and the
    # whole thing no-ops until the AWS prerequisites are in place. The script only
    # launches an EC2 that self-runs/publishes/terminates, then returns at once —
    # the workflow does not wait on the runner. See notes/superpowers/graviton-ci-aws-setup.md.
    - name: Configure AWS credentials (OIDC)
      if: env.AWS_GRAVITON_OIDC_ROLE != ''
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_GRAVITON_OIDC_ROLE }}
        aws-region: us-east-1

    - name: Fire Graviton benchmark of the released version (non-blocking)
      if: env.AWS_GRAVITON_OIDC_ROLE != ''
      continue-on-error: true
      run: |
        node src/scripts/graviton_perf.cjs --detached --release "${TAG}" --commit "${GITHUB_SHA}"

    # - name: Tweet notice
    #   run: |
    #     npm install && node ./src/buildjs/tweet.cjs
    #   env:
    #     JSSM_TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.JSSM_TWITTER_ACCESS_TOKEN_SECRET }}
    #     JSSM_TWITTER_API_ACCESS_TOKEN: ${{ secrets.JSSM_TWITTER_API_ACCESS_TOKEN }}
    #     JSSM_TWITTER_API_KEY: ${{ secrets.JSSM_TWITTER_API_KEY }}
    #     JSSM_TWITTER_API_SECRET: ${{ secrets.JSSM_TWITTER_API_SECRET }}
    #     TW_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}





  finish:

    needs: [release]

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v5

    - name: Results page
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo '### Results!' >> $GITHUB_STEP_SUMMARY
        echo "* Published $TAG to NPM" >> $GITHUB_STEP_SUMMARY
