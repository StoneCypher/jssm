  unicode-viz-dot:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over viz / dot rendering
      run: |
        npm install && npm run prep && npm run vitest-unicode-viz-dot



  # Push to main (or #fullbuild PR): cross-platform verification with the lean
  # ci_test (lite make_ci + vitest). Ubuntu carries the multi-Node engine
  # coverage (incl. the 20.x floor) cheaply; macOS/Windows (far costlier
  # runners) verify only current. Platform-invariant artifacts are produced
  # once by test-main-full, so this skips them.
  test-main-matrix:

    needs: [detect-fullbuild]
    if: github.event_name == 'push' || needs.detect-fullbuild.outputs.fullbuild == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  node-version: 24.x }   # current
          - { os: ubuntu-latest,  node-version: 23.x }   # newest non-lts
          - { os: ubuntu-latest,  node-version: 22.x }   # lts
          - { os: ubuntu-latest,  node-version: 20.x }   # engine floor (vitest 4 / rolldown ^20.19)
          - { os: macos-latest,   node-version: 24.x }
          - { os: windows-latest, node-version: 24.x }

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
    - name: npm install, build, and test (trimmed; full bundles+minify covered by pr-check and full-build)
      run: |
        npm install && npm run ci_test
      env:
        CI: true
    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v1.0.1
      with:
        github-token: ${{ secrets.github_token }}
        path-to-lcov: ./coverage/spec/lcov.info



  # Push to main (or #fullbuild PR): the canonical full build on Ubuntu —
  # produces every artifact (bundles, docs, site, cookbook, changelog, cloc,
  # readme) via the orchestrated `build` (release profile). The platform-
  # invariant artifact producer; the matrix verifies the rest cross-platform.
  test-main-full:

    needs: [detect-fullbuild]
    if: github.event_name == 'push' || needs.detect-fullbuild.outputs.fullbuild == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
    - name: npm install and full build (site, docs, cookbook, changelog, cloc, readme)
      run: |
        npm install && npm run build
      env:
        CI: true



  deploy-docs:

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: [test-main-full]

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # to force-push the built site to the gh-pages branch

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Build the site
      run: |
        npm install && npm run build
      env:
        CI: true

    # Publish docs/ to gh-pages with plain git and the built-in GITHUB_TOKEN —
    # no third-party action. A throwaway single-commit repo is created inside
    # docs/ and force-pushed, so gh-pages always equals the current build.
    # .nojekyll keeps GitHub Pages from dropping TypeDoc's _-prefixed assets.
    - name: Publish docs/ to gh-pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd docs
        touch .nojekyll
        git init -q
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -q -m "docs: publish site for ${GITHUB_SHA}"
        git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages



  benchmark:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Run the benchmarks
      run: |
        npm install && npm run benny



  verify-version-bump:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Verify the version was bumped
      run: |
        npm install
        git config --global user.email "stonecypher@users.noreply.github.com"
        git config --global user.name "John Haugeland through Github Actions"
        node ./src/buildjs/verify_version_bump.cjs



  release:

    if: (github.event_name == 'push') && (github.event.pusher.name == github.event.repository.owner.name) && (github.ref == 'refs/heads/main')

    needs: [test-main-full, test-main-matrix, verify-version-bump, unicode-strings, unicode-atoms, unicode-actions, unicode-atom-labels, unicode-string-labels, unicode-edge-labels, unicode-machine-properties, unicode-error-messages, unicode-group-names, unicode-state-decl-names, unicode-hooks, unicode-machine-metadata, unicode-state-properties, unicode-image-url, unicode-arrange, unicode-config-state-lists, unicode-config-state-blocks, unicode-viz-dot]

    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AWS_GRAVITON_OIDC_ROLE: ${{ secrets.AWS_GRAVITON_OIDC_ROLE }}

    # npm Trusted Publishing via OIDC.  Replaces the long-lived
    # NPM_TOKEN secret with short-lived tokens that GitHub Actions
    # exchanges with npm at publish time, scoped to this specific
    # workflow run.  Requires a Trusted Publisher entry on the npm
    # package settings page matching org=StoneCypher, repo=jssm,
    # workflow=nodejs.yml.
    permissions:
      contents: write   # for actions/checkout, git push --tags, and create-release
      id-token: write   # for OIDC token issuance to npm

    steps:
    - uses: actions/checkout@v5

    - name: Export tag to envvars
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo $TAG

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        registry-url: https://registry.npmjs.org/

    - name: Push tags
      run: git push origin --tags

    - name: Create or update the release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ env.TAG }}" >/dev/null 2>&1; then
          echo "Release ${{ env.TAG }} already exists; updating title and notes."
          gh release edit "${{ env.TAG }}" --title "${{ env.TAG }}" --notes-file CHANGELOG.md
        else
          gh release create "${{ env.TAG }}" --title "${{ env.TAG }}" --notes-file CHANGELOG.md
        fi

    - name: Publish to npm (skip if version already on registry)
      run: |
        if npm view "jssm@${TAG}" version >/dev/null 2>&1; then
          echo "jssm@${TAG} already published; skipping."
        else
          npm publish --provenance --access public
        fi

    # Fire-and-forget Graviton benchmark of the released version. Both steps are
    # gated on the AWS OIDC role secret existing and are continue-on-error, so the
    # release (already published above) never fails on a benchmark hiccup, and the
    # whole thing no-ops until the AWS prerequisites are in place. The script only
    # launches an EC2 that self-runs/publishes/terminates, then returns at once —
    # the workflow does not wait on the runner. See notes/superpowers/graviton-ci-aws-setup.md.
    - name: Configure AWS credentials (OIDC)
      if: env.AWS_GRAVITON_OIDC_ROLE != ''
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_GRAVITON_OIDC_ROLE }}
        aws-region: us-east-1

    - name: Fire Graviton benchmark of the released version (non-blocking)
      if: env.AWS_GRAVITON_OIDC_ROLE != ''
      continue-on-error: true
      run: |
        node src/scripts/graviton_perf.cjs --detached --release "${TAG}" --commit "${GITHUB_SHA}"

    # - name: Tweet notice
    #   run: |
    #     npm install && node ./src/buildjs/tweet.cjs
    #   env:
    #     JSSM_TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.JSSM_TWITTER_ACCESS_TOKEN_SECRET }}
    #     JSSM_TWITTER_API_ACCESS_TOKEN: ${{ secrets.JSSM_TWITTER_API_ACCESS_TOKEN }}
    #     JSSM_TWITTER_API_KEY: ${{ secrets.JSSM_TWITTER_API_KEY }}
    #     JSSM_TWITTER_API_SECRET: ${{ secrets.JSSM_TWITTER_API_SECRET }}
    #     TW_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}





  finish:

    needs: [release]

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v5

    - name: Results page
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo '### Results!' >> $GITHUB_STEP_SUMMARY
        echo "* Published $TAG to NPM" >> $GITHUB_STEP_SUMMARY
