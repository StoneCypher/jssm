    - name: Check full unicode over state properties
      run: |
        npm install && npm run prep && npm run vitest-unicode-state-property



  unicode-image-url:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: 24.x

    - name: Check full unicode over image and url style items
      run: |
        npm install && npm run prep && npm run vitest-unicode-image-url



  unicode-arrange:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
