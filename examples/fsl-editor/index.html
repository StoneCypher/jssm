<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>&lt;fsl-editor&gt; — showcase</title>
<style>
  :root {
    --ink:#0e1116; --ink-2:#161a22; --line:#2a2f3a; --text:#c9d1d9; --text-dim:#7d8694;
    --accent:#5b9dff; --signal:#ffb020; --graph-bg:#dddddd;
    --mono: ui-monospace,"Cascadia Code","JetBrains Mono",Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #1a2030 0%, var(--ink) 60%) fixed;
    color:var(--text); font-family:var(--sans); display:flex; flex-direction:column; min-height:100%;
  }
  header.page { display:flex; align-items:baseline; gap:.9rem; padding:1.2rem 1.4rem .3rem; }
  .brand { font-family:var(--mono); font-weight:700; font-size:1.12rem; letter-spacing:-.02em; color:#fff; }
  .brand .lt { color:var(--text-dim); } .brand .tag { color:var(--accent); }
  .tagline { color:var(--text-dim); font-size:.88rem; } .tagline b { color:var(--signal); font-weight:600; }

  main { flex:1; display:flex; padding:.7rem 1.4rem 1.2rem; min-height:0; }
  .device { flex:1; display:flex; min-height:0; border:1px solid #000; background:var(--ink-2); overflow:hidden; }

  /* The real host fills the device and owns the layout internally. We feed the
     whole suite the dark token palette; CSS custom properties cross shadow
     boundaries, so every nested fsl-* widget re-themes from these five vars. */
  fsl-instance {
    flex:1; min-width:0; min-height:0; display:block;
    --fsl-color-surface:#161a22; --fsl-color-text:#c9d1d9; --fsl-color-accent:var(--accent);
    --fsl-color-border:var(--line); --fsl-color-muted:var(--text-dim);
    --fsl-font:var(--sans); --fsl-font-mono:var(--mono);
  }
  fsl-viz { display:block; background:var(--graph-bg); padding:2em; }
  fsl-editor { display:block; min-height:0; --fsl-radius:0px; }

  /* A plain Docs button living in the toolbar's trailing slot. */
  .tb-help {
    height:1.9rem; padding:0 .7rem; cursor:pointer; border-radius:4px;
    border:1px solid var(--line); background:#232a38; color:var(--text); font:600 .8rem var(--sans);
  }
  .tb-help:hover { background:#2b3344; }

  /* <fsl-help> drawer — eases in from the right as a third pane. */
  fsl-help {
    flex:0 0 0; min-width:0; overflow:hidden; transition:flex-basis .28s ease;
    --fsl-color-surface:#11151c; --fsl-color-text:var(--text); --fsl-color-accent:var(--accent);
    --fsl-color-border:var(--line); --fsl-color-muted:var(--text-dim); --fsl-font:var(--sans);
  }
  fsl-help[open] { flex-basis:330px; }
  @media (prefers-reduced-motion: reduce) { fsl-help { transition:none; } }
  /* Docs sections slotted into the drawer body (light DOM — styleable here). */
  fsl-help details { border-top:1px solid var(--line); }
  fsl-help details:first-of-type { border-top:0; }
  fsl-help summary { cursor:pointer; padding:.55rem 0; font-weight:600; font-size:.84rem; list-style:none; display:flex; align-items:center; gap:.5rem; color:var(--text); }
  fsl-help summary::-webkit-details-marker { display:none; }
  fsl-help summary::before { content:"▸"; color:var(--accent); transition:transform .15s; }
  @media (prefers-reduced-motion: reduce) { fsl-help summary::before { transition:none; } }
  fsl-help details[open] summary::before { transform:rotate(90deg); }
  fsl-help .doc { padding:0 0 .6rem .9rem; color:var(--text-dim); font-size:.86rem; line-height:1.5; }
  fsl-help code { font-family:var(--mono); font-size:.82em; background:#232a38; padding:.05rem .3rem; border-radius:3px; }
  fsl-help kbd { font-family:var(--mono); font-size:.76rem; background:#232a38; border:1px solid #000; border-radius:3px; padding:.05rem .35rem; color:var(--text); }

  /* Parse-status pill slotted into the footer. */
  .status { display:inline-flex; align-items:center; gap:.35rem; }
  .err-dot { display:inline-block; width:.6em; height:.6em; border-radius:50%; background:#3fb950; transition:background .15s; }
  .err-dot.bad { background:#f85149; }

  footer.hint { padding:.5rem 1.4rem 1rem; color:var(--text-dim); font-size:.82rem; }
  footer.hint kbd { font-family:var(--mono); font-size:.76rem; background:#232a38; border:1px solid #000; border-radius:3px; padding:.05rem .35rem; color:var(--text); }
  footer.hint code { font-family:var(--mono); font-size:.82em; background:#232a38; padding:.05rem .3rem; border-radius:3px; color:var(--text); }
</style>
</head>
<body>
  <header class="page">
    <span class="brand"><span class="lt">&lt;</span>fsl<span class="lt">-</span><span class="tag">editor</span><span class="lt">&gt;</span></span>
    <span class="tagline">write a state machine &mdash; watch it <b>light up</b></span>
  </header>

  <main>
    <div class="device" id="device">
      <!-- the <fsl-instance> host, its whole widget suite, and an <fsl-help>
           drawer are built in JS so the host fsl is set before it connects -->
    </div>
  </main>

  <footer class="hint">
    every control here is a real <code>&lt;fsl-*&gt;</code> widget &nbsp;·&nbsp;
    drag the gutter · <kbd>Ctrl</kbd>+<kbd>Space</kbd> completes · <b>Play</b> to walk the machine
  </footer>

  <script type="module">
    import { fslDiagnostics } from './fsl-editor.bundle.js';   // registers the whole suite

    const SAMPLE = [
      'machine_name    : "Traffic Light";',
      'machine_version : 1.0.0;',
      'machine_license : MIT;',
      '',
      'graph_layout    : dot;',
      'flow            : down;',
      '',
      "Off 'Enable' -> Red;",
      "Red 'Next' => Green 'Next' => Yellow 'Next' => Red;",
      '[Red Yellow Green] ~> Off;',
      '',
      '// visual styling',
      'arrange [Green Yellow];',
      '',
      'state        : { corners: rounded; };',
      'state Red    : { background-color: pink; };',
      'state Yellow : { background-color: lightyellow; };',
      'state Green  : { background-color: lightgreen; };',
      'state Off : {',
      '  background-color : steelblue;',
      '  text-color       : white;',
      '  corners          : regular;',
      '};',
    ].join('\n');

    const make = (tag, slot) => {
      const el = document.createElement(tag);
      if (slot) { el.setAttribute('slot', slot); }
      return el;
    };

    // Build the host with its fsl set BEFORE connect, then slot the whole suite.
    const host = make('fsl-instance');
    host.setAttribute('layout', 'rl');   // viz left, editor right
    host.fsl = SAMPLE;

    const title   = make('span', 'title');               // empty → suppresses the placeholder
    const toolbar = make('fsl-toolbar', 'toolbar');
    const helpBtn = document.createElement('button');
    helpBtn.className = 'tb-help'; helpBtn.textContent = '? Docs';
    toolbar.append(helpBtn);                              // the toolbar's trailing slot

    const viz   = make('fsl-viz', 'viz');
    const ed    = make('fsl-editor', 'editor'); ed.id = 'ed';
    const sim   = make('fsl-simulation', 'simulation');
    const hist  = make('fsl-history', 'history');
    const data  = make('fsl-data-inspector', 'data-inspector');
    const hooks = make('fsl-hook-log', 'hook-log');
    const exp   = make('fsl-export', 'export');

    const footer = make('fsl-footer', 'footer');
    const statusEl = document.createElement('span');
    statusEl.className = 'status';
    statusEl.innerHTML = '<span class="err-dot" id="dot"></span><span id="status">ready</span>';
    footer.append(statusEl);                             // the footer's trailing slot

    host.append(title, toolbar, viz, ed, sim, hist, data, hooks, exp, footer);
    document.getElementById('device').prepend(host);

    // A real <fsl-help> drawer; the toolbar's Docs button toggles it.
    const help = make('fsl-help');
    help.innerHTML = `
      <details open>
        <summary>The composition</summary>
        <div class="doc">Everything on screen is a real fsl-* widget slotted into one
          <code>&lt;fsl-instance&gt;</code>: toolbar, viz, editor, history, data, hook-log,
          simulation, export, footer. The instance owns layout + state; editing rebuilds
          the machine and every panel follows. No glue code.</div>
      </details>
      <details>
        <summary>Toolbar &amp; layout</summary>
        <div class="doc">The <b>theme</b>, <b>View</b> (8 layouts), and <b>feature</b> toggles
          are the <code>&lt;fsl-toolbar&gt;</code> driving the editor + host. Drag the gutter to
          resize; double-click to reset.</div>
      </details>
      <details>
        <summary>Editing &amp; autocomplete</summary>
        <div class="doc"><kbd>Ctrl</kbd>+<kbd>Space</kbd> after a <code>:</code> for context
          completions. Colour values get a swatch chip; state names and enums are marked.</div>
      </details>
      <details>
        <summary>Run it</summary>
        <div class="doc"><b>Play</b> on <code>&lt;fsl-simulation&gt;</code> random-walks the machine;
          <code>&lt;fsl-history&gt;</code> traces the path, <code>&lt;fsl-hook-log&gt;</code> logs every
          event, and <code>&lt;fsl-footer&gt;</code> shows live state. <b>Export</b> copies DOT / JSON / FSL.</div>
      </details>`;
    document.getElementById('device').append(help);
    helpBtn.onclick = () => { help.open = !help.open; };

    // Status pill: the editor text is the source of truth for validity.
    const dot = document.getElementById('dot'), status = document.getElementById('status');
    function refreshStatus(fsl) {
      const errs = fslDiagnostics(fsl);
      if (errs.length) {
        dot.classList.add('bad');
        status.textContent = 'parse error';
      } else {
        dot.classList.remove('bad');
        status.textContent = 'valid';
      }
    }
    ed.addEventListener('change', e => refreshStatus(e.detail.fsl));
    setTimeout(() => refreshStatus(host.fsl), 250);

    // Export → clipboard, with a quick status flash.
    host.addEventListener('fsl-export', e => {
      const { format, content } = e.detail;
      if (navigator.clipboard) { navigator.clipboard.writeText(content); }
      status.textContent = `copied ${format.toUpperCase()} · ${content.length} chars`;
    });
  </script>
</body>
</html>
